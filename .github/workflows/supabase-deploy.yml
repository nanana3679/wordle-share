name: Deploy Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets length
        run: |
          echo "ref length: ${#SUPABASE_PROJECT_REF}"
          echo "token prefix: ${SUPABASE_ACCESS_TOKEN:0:4}"
          echo "pwd length: ${#SUPABASE_DB_PASSWORD}"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        # --include-all: PR이 비순차적으로 머지되어 remote의 마지막 마이그레이션보다
        # 이른 timestamp의 local 파일이 들어온 경우에도 적용한다.
        # (예: 20260429가 먼저 적용된 뒤 20260428이 머지된 케이스)
        run: supabase db push --include-all
