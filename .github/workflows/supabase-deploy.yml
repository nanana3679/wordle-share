name: Deploy Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets present
        run: |
          [ -n "$SUPABASE_PROJECT_REF" ] || { echo "PROJECT_REF empty"; exit 1; }
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || { echo "ACCESS_TOKEN empty"; exit 1; }
          [ -n "$SUPABASE_DB_PASSWORD" ] || { echo "DB_PASSWORD empty"; exit 1; }
          echo "ref length: ${#SUPABASE_PROJECT_REF}"
          echo "token prefix: ${SUPABASE_ACCESS_TOKEN:0:4}"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --debug

      - name: Push migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD" --debug
